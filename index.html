<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duarah Store - Check Result</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #111, #000);
  color: white;
  text-align:center;
}

/* HEADER */
header {
  padding:15px;
  background: linear-gradient(90deg,#ffcc00,#ff6600);
  color:black;
}

/* BOX */
.box {
  margin:30px auto;
  padding:20px;
  border:2px solid #00ff00;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

/* INPUT + BUTTON */
input, button {
  padding:12px;
  font-size:18px;
  margin-top:10px;
  border-radius:5px;
  border:none;
}

button {
  background:#00cc44;
  color:white;
}

/* SLOT */
#slot {
  font-size:40px;
  margin:20px;
}

/* BLINK */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* CONFETTI FALL */
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<header>
<h2>🎉 DUARAH STORE 🎉</h2>
Check Lucky Draw Result
</header>

<div class="box">

<div id="slot">----</div>

<input type="text" id="serial" placeholder="Enter Serial No"><br>
<input type="text" id="phone" maxlength="5" placeholder="Enter Last 5 Digits">

<button onclick="startCheck()">Check Result</button>

<div id="result"></div>

<div id="whatsappBox" style="display:none;">
  <a id="waLink" target="_blank">
    <button style="background:#25D366;">📲 Claim on WhatsApp</button>
  </a>
</div>

</div>

<script>

const dataURL = "https://opensheet.elk.sh/1BoY54pcG9Xao8wgnZtaE5HKXyr0QgOxQwsYvmTlYme0/History";

function randomSerial() {
  return Math.floor(1 + Math.random()*500);
}

function spinSlot(callback) {
  let slot = document.getElementById("slot");
  let count = 0;

  let interval = setInterval(() => {
    slot.innerHTML = randomSerial();
    count++;

    if (count > 20) {
      clearInterval(interval);
      callback();
    }
  }, 50);
}

async function startCheck() {

  let resultDiv = document.getElementById("result");

  let serial = document.getElementById("serial").value.trim();
  let phone = document.getElementById("phone").value.trim();

  let cleanInput = serial.replace(/\D/g, "");
  let userLast5 = phone.replace(/\D/g, "");

  // ✅ VALIDATION FIRST
  if (!cleanInput) {
    resultDiv.innerHTML = "⚠ Enter valid serial number";
    return;
  }

  if (userLast5.length !== 5) {
    resultDiv.innerHTML = "⚠ Enter last 5 digits of phone";
    return;
  }

  // SPIN
  resultDiv.innerHTML = "Spinning...";
  resultDiv.classList.add("blink");

  spinSlot(async () => {

    try {
      let response = await fetch(dataURL, { cache: "no-store" });
      let data = await response.json();

      console.log("DATA:", data);

let found = data.find(row => {

  // 🔥 Fix column name issues
  let serialVal = row.Serial || row["Serial"] || row[" Serial"];
  let phoneVal = row.Phone || row["Phone"] || row[" Phone"];

  if (!serialVal || !phoneVal) return false;

  let sheetSerial = serialVal.toString().trim().replace(/\D/g, "");
  let sheetPhone = phoneVal.toString().trim().replace(/\D/g, "");

  let last5 = sheetPhone.slice(-5);

  console.log("CHECK:", sheetSerial, cleanInput, last5, userLast5);

  return (
    Number(sheetSerial) === Number(cleanInput) &&
    last5 === userLast5
  );
});

      document.getElementById("slot").innerHTML = cleanInput;
      resultDiv.classList.remove("blink");

      if (found) {

        resultDiv.innerHTML =
          "🎉 YOU WON! 🎉<br>" + found.Position +
          "<br><br>📸 Send screenshot on WhatsApp";

        launchConfetti();

        let shopNumber = "917002747619";

        let msg = `Hello Duarah Store, I am a winner!\nSerial: ${cleanInput}\nPrize: ${found.Position}`;

        let link = "https://wa.me/" + shopNumber + "?text=" + encodeURIComponent(msg);

        document.getElementById("waLink").href = link;
        document.getElementById("whatsappBox").style.display = "block";

      } else {
        resultDiv.innerHTML = "❌ Not a winner<br>Try again!";
        document.getElementById("whatsappBox").style.display = "none";
      }

    } catch (error) {
      console.error(error);
      resultDiv.classList.remove("blink");
      resultDiv.innerHTML = "⚠ Error loading result";
    }

  });
}

// CONFETTI
function launchConfetti() {

  for (let i=0; i<30; i++) {

    let div = document.createElement("div");
    div.style.position = "fixed";
    div.style.width = "10px";
    div.style.height = "10px";
    div.style.top = "0";
    div.style.left = Math.random()*100 + "vw";
    div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    div.style.animation = "fall 3s linear";

    document.body.appendChild(div);

    setTimeout(()=>div.remove(),3000);
  }
}
</script>

</body>
</html>
