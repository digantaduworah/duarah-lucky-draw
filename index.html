<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duarah Store - Check Result</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #111, #000);
  color: white;
  text-align:center;
}
header {
  padding:15px;
  background: linear-gradient(90deg,#ffcc00,#ff6600);
  color:black;
}
.box {
  margin:30px auto;
  padding:20px;
  border:2px solid #00ff00;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
input, button {
  padding:12px;
  font-size:18px;
  margin-top:10px;
  border-radius:5px;
  border:none;
}
button {
  background:#00cc44;
  color:white;
}
#slot {
  font-size:40px;
  margin:20px;
}
</style>
</head>

<body>

<header>
<h2>🎉 DUARAH STORE 🎉</h2>
Check Lucky Draw Result
</header>

<div class="box">

<div id="slot">----</div>

<input type="text" id="serial" placeholder="Enter Serial No"><br>
<input type="text" id="phone" placeholder="Last 5 Digits"><br>

<button onclick="startCheck()">Check Result</button>

<div id="result"></div>

<div id="whatsappBox" style="display:none;">
  <a id="waLink" target="_blank">
    <button style="background:#25D366;">📲 Claim on WhatsApp</button>
  </a>
</div>

</div>

<script>

// ===== YOUR SCRIPT =====

const dataURL = "https://opensheet.elk.sh/1BoY54pcG9Xao8wgnZtaE5HKXyr0QgOxQwsYvmTlYme0/History";

function randomSerial() {
  return Math.floor(1 + Math.random()*500);
}

function spinSlot(callback) {
  let slot = document.getElementById("slot");
  let count = 0;

  let interval = setInterval(() => {
    slot.innerHTML = randomSerial();
    count++;

    if (count > 20) {
      clearInterval(interval);
      callback();
    }
  }, 50);
}

async function startCheck() {

  let resultDiv = document.getElementById("result");
  let serial = document.getElementById("serial").value.trim();
  let phone = document.getElementById("phone").value;

  if (!serial) {
    resultDiv.innerHTML = "⚠ Enter serial";
    return;
  }

  resultDiv.innerHTML = "Spinning...";

  spinSlot(async () => {

    let response = await fetch(dataURL);
    let data = await response.json();

    let cleanInput = serial.replace(/\D/g, "");
    let userLast5 = phone.replace(/\D/g, "");

    let found = data.find(row => {
      let sheetSerial = row.Serial.toString().replace(/\D/g, "");
      let sheetPhone = row.Phone.toString().replace(/\D/g, "");
      return sheetSerial === cleanInput && sheetPhone.slice(-5) === userLast5;
    });

    document.getElementById("slot").innerHTML = cleanInput;

    if (found) {
      resultDiv.innerHTML = "🎉 YOU WON! " + found.Position;

      let msg = `I am winner! Serial: ${cleanInput}`;
      let link = "https://wa.me/917002747619?text=" + encodeURIComponent(msg);

      document.getElementById("waLink").href = link;
      document.getElementById("whatsappBox").style.display = "block";

    } else {
      resultDiv.innerHTML = "❌ Not a winner";
      document.getElementById("whatsappBox").style.display = "none";
    }

  });
}

</script>

</body>
</html>
