<script>

const dataURL = "https://opensheet.elk.sh/1BoY54pcG9Xao8wgnZtaE5HKXyr0QgOxQwsYvmTlYme0/History";

function randomSerial() {
  return Math.floor(1 + Math.random()*500);
}

// SLOT ANIMATION
function spinSlot(callback) {

  let slot = document.getElementById("slot");
  let count = 0;

  let interval = setInterval(() => {
    slot.innerHTML = randomSerial();
    count++;

    if (count > 20) {
      clearInterval(interval);
      callback();
    }

  }, 50);
}


// MAIN FUNCTION
async function startCheck() {

  let resultDiv = document.getElementById("result");

  let serial = document.getElementById("serial").value.trim();
  let phone = document.getElementById("phone").value;

  if (!serial) {
    resultDiv.innerHTML = "⚠ Enter serial number";
    return;
  }

  resultDiv.innerHTML = "Spinning...";
  resultDiv.classList.add("blink");

  spinSlot(async () => {

    try {

      let response = await fetch(dataURL, { cache: "no-store" });
      let data = await response.json();

      let cleanInput = serial.replace(/\D/g, "");
      let userLast5 = phone.replace(/\D/g, "");

      if (userLast5.length !== 5) {
        resultDiv.innerHTML = "⚠ Enter valid last 5 digits";
        resultDiv.classList.remove("blink");
        return;
      }

      let found = data.find(row => {
        if (!row.Serial || !row.Phone) return false;

        let sheetSerial = row.Serial.toString().replace(/\D/g, "");
        let sheetPhone = row.Phone.toString().replace(/\D/g, "");

        let last5 = sheetPhone.slice(-5);

        return (
          sheetSerial === cleanInput &&
          last5 === userLast5
        );
      });

      document.getElementById("slot").innerHTML = cleanInput;
      resultDiv.classList.remove("blink");

      if (found) {
        resultDiv.innerHTML = "🎉 YOU WON! 🎉<br>" + found.Position +
        "<br><br>📸 Send screenshot on WhatsApp";

        launchConfetti();

        let shopNumber = "917002747619";

        let msg = `Hello Duarah Store, I am a winner!\nSerial: ${cleanInput}\nPrize: ${found.Position}`;

        let link = "https://wa.me/" + shopNumber + "?text=" + encodeURIComponent(msg);

        document.getElementById("waLink").href = link;
        document.getElementById("whatsappBox").style.display = "block";

      } else {
        resultDiv.innerHTML = "❌ Not a winner<br>Try again!";
        document.getElementById("whatsappBox").style.display = "none";
      }

    } catch (error) {
      console.error(error);
      resultDiv.classList.remove("blink");
      resultDiv.innerHTML = "⚠ Error loading result";
    }

  });
}


// CONFETTI
function launchConfetti() {

  for (let i=0; i<30; i++) {

    let div = document.createElement("div");
    div.className = "confetti";
    div.style.left = Math.random()*100 + "vw";
    div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    div.style.animationDuration = (2+Math.random()*2) + "s";

    document.body.appendChild(div);

    setTimeout(()=>div.remove(),3000);
  }
}

</script>
